{% extends "expenses/base.html" %}
{% block title %}Delete Expense – SmartExpense{% endblock %}

{% block content %}
<div class="page" style="max-width:500px;">
  <div class="card" style="text-align:center;padding:40px;">
    <div style="font-size:48px;margin-bottom:16px;">🗑️</div>
    <h2 style="color:#f1f5f9;font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:8px;">Delete Expense?</h2>
    <p style="color:#94a3b8;margin-bottom:6px;">You are about to delete:</p>
    <p style="color:#f1f5f9;font-weight:600;font-size:16px;margin-bottom:4px;">{{ expense.description }}</p>
    <p style="color:#f87171;font-weight:700;font-size:18px;margin-bottom:24px;">₹{{ expense.amount }}</p>
    <p style="color:#64748b;font-size:13px;margin-bottom:28px;">This action cannot be undone.</p>

    <div style="display:flex;gap:12px;justify-content:center;">
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
      </form>
      <a href="{% url 'expense_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </div>
</div>
{% endblock %}
