<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – SmartExpense</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%); display: flex; align-items: center; justify-content: center; font-family: 'DM Sans', sans-serif; }
    .card { width: 420px; background: #1e293b; border-radius: 20px; padding: 40px; border: 1px solid #334155; box-shadow: 0 25px 60px rgba(0,0,0,.5); }
    .brand { text-align: center; margin-bottom: 32px; }
    .brand .emoji { font-size: 40px; display: block; margin-bottom: 8px; }
    .brand h1 { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: #f1f5f9; letter-spacing: -1px; }
    .brand p { color: #94a3b8; font-size: 14px; margin-top: 4px; }
    .tabs { display: flex; border-bottom: 1px solid #334155; margin-bottom: 28px; }
    .tab { flex: 1; padding: 10px; background: transparent; border: none; border-bottom: 2px solid transparent; cursor: pointer; font-size: 14px; font-weight: 600; font-family: 'DM Sans', sans-serif; color: #94a3b8; transition: all .2s; text-decoration: none; text-align: center; display: block; }
    .tab.active { color: #6366f1; border-bottom-color: #6366f1; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; color: #94a3b8; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
    .form-control { width: 100%; padding: 12px 16px; background: #0f172a; border: 1.5px solid #334155; border-radius: 10px; color: #f1f5f9; font-size: 15px; font-family: 'DM Sans', sans-serif; outline: none; transition: border .2s; }
    .form-control:focus { border-color: #6366f1; }
    .btn { width: 100%; padding: 13px; background: linear-gradient(135deg,#6366f1,#8b5cf6); border: none; border-radius: 10px; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity .2s; margin-top: 8px; }
    .btn:hover { opacity: .9; }
    .error { background: #450a0a; border: 1px solid #dc2626; color: #f87171; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
    .demo-hint { color: #475569; font-size: 12px; text-align: center; margin-top: 20px; }
    .demo-hint span { color: #94a3b8; }
    ul.errorlist { list-style: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="brand">
    <span class="emoji">💰</span>
    <h1>SmartExpense</h1>
    <p>Track your spending, master your money</p>
  </div>

  <div class="tabs">
    <a href="{% url 'login' %}" class="tab active">Sign In</a>
    <a href="{% url 'signup' %}" class="tab">Sign Up</a>
  </div>

  {% if form.non_field_errors %}
    <div class="error">{{ form.non_field_errors }}</div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" name="username" class="form-control" placeholder="Enter your username" autofocus>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" placeholder="Enter your password">
    </div>
    <button type="submit" class="btn">Sign In</button>
  </form>

  <p class="demo-hint">New here? <a href="{% url 'signup' %}" style="color:#6366f1;">Create an account</a></p>
</div>
</body>
</html>
